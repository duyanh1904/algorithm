name: Run JavaScript Tests and Auto-LeetCode

on:
  push:
    branches: [ main, master ]
  schedule:
    # 18:00 UTC tương ứng với 01:00 (1 AM) sáng ngày hôm sau theo giờ Việt Nam (GMT+7)
    - cron: '0 18 * * *'
jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    # Bước 1: Khởi chạy Unit Test toàn bộ những file cũ hiện tại xem có đạt không
    - name: Run Unit Tests for existing solutions
      run: |
        echo "Kiểm tra và chạy các bài toán hiện có..."
        if [ -d "js" ]; then
          cd js
          for file in *.js; do
            echo "Đang kiểm thử file: $file"
            node "$file"
            if [ $? -ne 0 ]; then
              echo "❌ Phát hiện lỗi kiểm thử tại file $file!"
              exit 1
            fi
          done
        else
          echo "Thư mục js chưa tồn tại. Sẽ được tạo ở bước sau."
        fi

    # Bước 2: Kích hoạt Bot tự động cào bài toán Daily của hôm nay về
    - name: Fetch today LeetCode Daily Challenge
      run: node crawler.js

    # Bước 3: Tự động dùng biến môi trường định danh tác giả và đẩy code lên GitHub
    - name: Commit and Push new question template
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "${{ github.repository_owner }}"
        git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"
        
        # Thêm file mới vào vùng bốc xếp (Staging area)
        git add js/
        
        # Kiểm tra xem hôm nay có phát sinh file mới nào không để tránh commit trống
        if ! git diff --cached --quiet; then
          git commit -m "Feat: Auto-scraped LeetCode Daily with functional Test Cases"
          git push
        else
          echo "Không có bài mới nào được cập nhật trong ngày hôm nay."
        fi
